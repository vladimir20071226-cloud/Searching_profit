{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2>Подтверждение почты</h2>
    <form method="post">
        {% csrf_token %}
        <div>
            <label>Email:</label>
            <input type="email" name="email" required>
        </div>
        <button type="submit">Отправить подтверждение</button>
    </form>
</div>
{% endblock %}
