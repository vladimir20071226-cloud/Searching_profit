{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2>Добавить товар</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label for="{{ field.id_for_label }}" class="form_label">
                {{ field.label }}
            </label>
                {% if field.errors %}
                    <div class="text-danger">
                        {{ field.errors }}
                    </div>
                {% endif %}
        </div>
    {% endfor %}
        <button type="submit" class="btn btn-primary">Сохрнаить</button>
    </form>
</div>
{% endblock %}
