{% extends 'base.html' %}
{% block content %}
  <h2>Редактировать товар</h2>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="name">Название</label>
      <input type="text" id="name" name="name" class="form-control" value="{{ product.name }}">
    </div>
    <div class="form-group">
      <label for="buy_price">Цена покупки</label>
      <input type="number" id="buy_price" name="buy_price" class="form-control" value="{{ product.buy_price }}">
    </div>
    <div class="form-group">
      <label for="sell_price">Цена продажи</label>
      <input type="number" id="sell_price" name="sell_price" class="form-control" value="{{ product.sell_price }}">
    </div>
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'product_list' %}" class="btn btn-secondary">Назад</a>
  </form>
{% endblock %}
